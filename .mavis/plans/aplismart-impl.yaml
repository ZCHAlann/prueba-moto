tasks:
  - id: t2-flotas
    title: "Flotas: modal maintenance igual al original + KPI filter + chart redirect + hover"
    prompt: "Eres un desarrollador frontend en el proyecto ApliSmart Motors. PROYECTO: C:\\Users\\netwn\\Trabajos\\Motors\\motors-aplismart-main\\motors-aplismart-main Frontend: apps/frontend/src/pages/Gestion/Flotas/page.tsx CONTEXTO: La pagina Flotas tiene un modal simple de crear mantenimiento (CreateMaintenanceModal) que es MUCHO mas simple que el modal real en Mantenimientos (MaintenanceFormModal.tsx). TRABAJO: 1. Reemplazar CreateMaintenanceModal de Flotas con una version que use MaintenanceFormModal real (lazy import desde @/pages/Mantenimientos/components/MaintenanceFormModal). Pattern existe en dashboard/maintenance-table.tsx. Mantener props { vehicle, onClose, onCreated }. 2. KPI click filtering: usar URL params ?kpi=label para filtrar la tabla. 3. Charts con redirect: usar useNavigate() + navigate(). 4. Charts con hover enriquecido: mejorar tooltips. REGLAS: mantener dark mode, no romper existentes, reportar archivos modificados."
    assigned_to: general
    max_retries: 2
    verify_skip_reason: Owner will review file changes directly
  - id: t3-acta
    title: "Acta asignacion: validar inputs y mostrar solo lo necesario"
    prompt: "Eres un desarrollador frontend en el proyecto ApliSmart Motors. PROYECTO: C:\\Users\\netwn\\Trabajos\\Motors\\motors-aplismart-main\\motors-aplismart-main Frontend: apps/frontend/src/pages/Gestion/Asignaciones/ TRABAJO: 1. Leer page.tsx COMPLETO, ActaPdf.tsx COMPLETO, HandoverWizard.tsx. 2. Validacion de inputs: campos requeridos, formato de fechas, km numericos. Agregar validacion en tiempo real con mensajes inline. Boton submit deshabilitado hasta que campos requeridos esten validos. 3. Simplificar: solo mostrar campos relevantes, eliminar los que no se usan. 4. Pre-llenar placa, nombre conductor, fecha actual, km actuales cuando se abre desde asignacion existente. REGLAS: mantener estilo existente, no romper funcionalidades, validacion inline."
    assigned_to: general
    max_retries: 2
    verify_skip_reason: Owner will review file changes directly
  - id: t4-dashboard
    title: "Dashboard: modal terminar mantenimiento con fotos y estado actual"
    prompt: "Eres un desarrollador frontend en el proyecto ApliSmart Motors. PROYECTO: C:\\Users\\netwn\\Trabajos\\Motors\\motors-aplismart-main\\motors-aplismart-main Frontend: apps/frontend/src/ CONTEXTO: Cuando se hace clic en Finalizar en la tabla de mantenimientos del dashboard, se abre MaintenanceFormModal. TRABAJO: 1. Leer MaintenanceFormModal.tsx COMPLETO, maintenance-table.tsx, MaintenanceDetailDrawer.tsx. 2. Detectar cuando se esta finalizando (maintenance existe + status = En proceso). En ese caso: hacer prominente la seccion de fotos con mensaje Fotos del trabajo terminado y borde naranja/amarillo, mostrar fotos existentes, requerir al menos una foto para finalizar con mensaje inline si no hay fotos. 3. Verificar que al hacer clic en Finalizar en dashboard se abre el modal correcto con maintenance prop. NO cambiar comportamiento para crear o editar. REGLAS: mantener estilos, cambios solo para flujo finalizar, reportar archivos."
    assigned_to: general
    max_retries: 2
    verify_skip_reason: Owner will review file changes directly
  - id: t5-mants-fecha
    title: "Mantenimientos: fecha vencimiento, atrasos, filtro taller/proveedor con reporte"
    prompt: "Eres un desarrollador frontend en el proyecto ApliSmart Motors. PROYECTO: C:\\Users\\netwn\\Trabajos\\Motors\\motors-aplismart-main\\motors-aplismart-main Frontend: apps/frontend/src/pages/Mantenimientos/ Backend: apps/backend/src/routes/company/ TRABAJO: 1. Leer MaintenanceListTab.tsx COMPLETO, page.tsx, useMaintenances.ts, useMaintenancesV2.ts, schema operational.ts. 2. Verificar si dueDate existe. Si no existe, no agregar (avisa que necesita migracion). Si existe, mostrarlo en la tabla. Resaltar en rojo los atrasados (dueDate < hoy AND status != Completado). Resaltar en amarillo los que vencen en 3 dias. 3. Banner de atrasos en MaintenanceListTab: si hay atrasados mostrar banner rojo/arriba con X mantenimientos atrasados. Al clic filtrar tabla a solo atrasados. 4. Agregar dropdowns de filtro por taller (useWorkshops) y proveedor (useSuppliers) en la tabla. Agregar boton Exportar reporte CSV: mantenimientos filtrados + sumatoria costos + agrupados por taller/proveedor. REGLAS: mantener estilos, filtro funciona junto con existentes, reporte como CSV."
    assigned_to: general
    max_retries: 2
    verify_skip_reason: Owner will review file changes directly
